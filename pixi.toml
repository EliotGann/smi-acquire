[workspace]
name = "smi-acquire"
description = "Interrogation-driven acquisition builder + interactive sample/microfocus builder for the NSLS-II SMI-SWAXS endstation"
channels = ["conda-forge", "nsls2forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.11.*"
pip = "*"
numpy = "*"
pandas = ">=2.0,<3"
# GUI (Panel/Bokeh) + the interactive on-axis microscope
panel = ">=1.4"
bokeh = ">=3.4"
pyyaml = "*"
pydantic = ">=2"
scikit-image = "*"
shapely = "*"
watchfiles = "*"
# EPICS + bluesky stack (fake IOC for the microscope; SimBeamline for dry-runs).
# `bluesky-base` is the lightweight variant: same `bluesky` Python package (plan_stubs /
# preprocessors / plans / RunEngine — all this app imports) but WITHOUT the heavy interactive
# analysis pulls of the full `bluesky` meta-package (databroker → tiled → duckdb/pyarrow/xarray
# → numba/llvmlite, and matplotlib → Qt). Saves ~250 MB / ~150 packages with no feature loss.
pyepics = "*"
ophyd = "*"
caproto = "*"
p4p = "*"
bluesky-base = "*"
pytest = "*"
ruff = "*"

[pypi-dependencies]
smi-acquire = { path = ".", editable = true }
# The sibling smi-plans package: the source of truth for the Sample/SampleStore model and the
# composable acquisition plans this app generates. Editable so edits to ../smi-plans are live.
smi-plans = { path = "../smi-plans", editable = true }
# Redis-backed sample store: db=2 'swaxssamples' (shared bus with the beamline; see
# ../smi-plans/docs/SAMPLE_SYSTEM_PLAN.md). `redis` is pulled in transitively; the JSON dict
# wrapper the store uses is not, so request it explicitly.
redis-json-dict = "*"

[activation.env]
# Keep the env hermetic (ignore ~/.local site-packages that would shadow conda deps).
PYTHONNOUSERSITE = "1"
# Where the smi_plans package lives (codegen targets it; dry-run imports it). This is OUR
# checkout (egann's is not group-readable). smi_plans is also pip-installed editable above, so
# this is now only a fallback/explicit hint for the codegen + samples bridge.
SMI_PLANS_PATH = "../smi-plans/src"
# Point the vendored microscope at the bundled fake-IOC config.
BEAM_IMAGE_CONFIG = "config/microscope.yaml"
# Development safety default: never touch the beamline Redis sample/list stores or RE-busy key.
# `app-real` explicitly opts back into live Redis below.
SMI_ACQUIRE_OFFLINE = "1"
SMI_ACQUIRE_NO_INTERLOCK = "1"
SMI_ACQUIRE_NO_PROPOSAL = "1"

# --------------------------------------------------------------------------
# The unified guided-interview app (interrogation + interactive sample builder).
# Serves on 5098 to avoid colliding with other Panel servers (5006 / 5099).
# Run `pixi run dev-ioc` in another terminal first for the live camera + motors.
#
# NOTE: `dev-ioc` binds the fake IOC to loopback only, so the app (a CA *client*) must be
# told to look at 127.0.0.1 — hence the EPICS_CA_* env here. Redis is forced offline by the
# activation env above, so this task cannot read/write the shared beamline stores.
# --------------------------------------------------------------------------
[tasks.app]
cmd = "panel serve apps/acquire_app.py --show --autoreload --port 5098"
env = { BEAM_IMAGE_CONFIG = "config/microscope.yaml", EPICS_CA_AUTO_ADDR_LIST = "no", EPICS_CA_ADDR_LIST = "127.0.0.1", SMI_ACQUIRE_OFFLINE = "1", SMI_ACQUIRE_NO_INTERLOCK = "1", SMI_ACQUIRE_NO_PROPOSAL = "1" }

# Hardware-free fake IOC (SWAXS:SIM: camera + X/Y/Z motors), bound to localhost.
[tasks.dev-ioc]
cmd = "python -m smi_acquire.sim.fake_ioc"
env = { EPICS_CA_AUTO_ADDR_LIST = "no", EPICS_CA_ADDR_LIST = "127.0.0.1", EPICS_CAS_AUTO_BEACON_ADDR_LIST = "no", EPICS_CAS_BEACON_ADDR_LIST = "127.0.0.1", EPICS_CAS_INTF_ADDR_LIST = "127.0.0.1" }

# Real-PV variant: connects to the LIVE beamline. Inherits your shell's EPICS_CA_* (so CA/PVA
# find the real IOCs — do NOT pin EPICS_CA_ADDR_LIST here) and loads config/microscope.local.yaml
# (the gitignored real-PV override: XF:12IDC camera over PVA + the SmarAct piezo motors).
[tasks.app-real]
cmd = "panel serve apps/acquire_app.py --show --autoreload --port 5098"
env = { BEAM_IMAGE_CONFIG = "config/microscope.local.yaml", SMI_ACQUIRE_OFFLINE = "0", SMI_ACQUIRE_NO_INTERLOCK = "0", SMI_ACQUIRE_NO_PROPOSAL = "0" }

[tasks.test]
cmd = "python -m pytest tests/ -q"

[tasks.lint]
cmd = "ruff check src apps tests"

[tasks.check]
cmd = "python -c \"import smi_acquire; print('core OK', smi_acquire.__version__)\""
